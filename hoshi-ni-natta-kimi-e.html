<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星になった君へ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Zen+Kurenaido&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Noto Serif JP',serif;}
#c{display:block;width:100vw;height:100vh;}

/* UI OVERLAY */
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;}

/* タイトル画面 */
#title{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 60%, #0a0e1a 0%, #000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;transition:opacity 1.5s ease;
}
#title.fade{opacity:0;pointer-events:none;}
.title-stars{position:absolute;inset:0;overflow:hidden;}
.t-star{position:absolute;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite var(--delay);}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
.title-main{
  font-family:'Zen Kurenaido',cursive;
  font-size:clamp(28px,7vw,56px);
  color:#e8d5b0;
  letter-spacing:.2em;
  text-shadow:0 0 40px rgba(232,213,176,.4), 0 0 80px rgba(232,213,176,.15);
  margin-bottom:16px;
  animation:fadeIn 2s ease forwards;
}
.title-sub{
  font-size:clamp(11px,2.5vw,14px);
  color:rgba(200,185,160,.6);
  letter-spacing:.3em;
  margin-bottom:60px;
  animation:fadeIn 2.5s ease forwards;
}
.start-btn{
  pointer-events:all;
  background:transparent;
  border:1px solid rgba(232,213,176,.35);
  color:#e8d5b0;
  padding:14px 48px;
  font-family:'Zen Kurenaido',cursive;
  font-size:15px;
  letter-spacing:.25em;
  cursor:pointer;
  border-radius:2px;
  transition:all .4s ease;
  animation:fadeIn 3s ease forwards;
}
.start-btn:hover{
  background:rgba(232,213,176,.08);
  border-color:rgba(232,213,176,.7);
  box-shadow:0 0 30px rgba(232,213,176,.2);
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* HUD */
#hud{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;align-items:center;
  opacity:0;transition:opacity 1s;
}
#hud.show{opacity:1;}
.letter-pip{
  width:10px;height:10px;border-radius:50%;
  border:1px solid rgba(232,213,176,.4);
  background:transparent;
  transition:all .5s;
}
.letter-pip.collected{
  background:rgba(232,213,176,.8);
  box-shadow:0 0 8px rgba(232,213,176,.6);
}
.hud-label{
  font-size:11px;color:rgba(200,185,160,.5);
  letter-spacing:.15em;margin-right:6px;
}

/* メッセージボックス */
#msgBox{
  position:fixed;bottom:0;left:0;right:0;
  padding:28px clamp(20px,8vw,120px) 36px;
  background:linear-gradient(0deg,rgba(0,0,0,.92) 0%,rgba(0,0,0,.7) 70%,transparent 100%);
  transform:translateY(100%);
  transition:transform .6s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
#msgBox.show{transform:translateY(0);pointer-events:all;}
.msg-speaker{
  font-size:11px;color:rgba(232,213,176,.5);
  letter-spacing:.3em;margin-bottom:8px;
}
.msg-text{
  font-size:clamp(13px,3vw,16px);
  color:#e8d5b0;
  line-height:2;
  letter-spacing:.05em;
  min-height:2.5em;
}
.msg-cursor{
  display:inline-block;width:2px;height:1em;
  background:#e8d5b0;vertical-align:middle;
  animation:blink .7s step-end infinite;margin-left:2px;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.msg-next{
  margin-top:12px;
  font-size:11px;color:rgba(200,185,160,.4);
  letter-spacing:.2em;
  animation:fadeInUp .5s ease forwards;
  pointer-events:all;cursor:pointer;
}
@keyframes fadeInUp{from{opacity:0;}to{opacity:.6;}}

/* 手紙収集エフェクト */
#letterCollect{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#letterCollect.show{opacity:1;}
.lc-icon{font-size:48px;animation:letterPop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes letterPop{from{transform:scale(0) rotate(-10deg);}to{transform:scale(1) rotate(0deg);}}
.lc-text{
  font-family:'Zen Kurenaido',cursive;
  font-size:14px;color:#e8d5b0;
  letter-spacing:.2em;margin-top:8px;
  text-shadow:0 0 20px rgba(232,213,176,.8);
}

/* エンディング */
#ending{
  position:fixed;inset:0;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 2s ease;
  padding:40px clamp(20px,10vw,160px);text-align:center;
}
#ending.show{opacity:1;pointer-events:all;}
.ending-letter{
  font-size:clamp(13px,2.5vw,17px);
  color:#c8b896;
  line-height:2.4;
  letter-spacing:.06em;
  max-width:600px;
  white-space:pre-line;
  margin-bottom:40px;
}
.ending-sig{
  font-family:'Zen Kurenaido',cursive;
  font-size:16px;color:#e8d5b0;
  letter-spacing:.2em;margin-bottom:50px;
}
.ending-stars{
  font-size:clamp(28px,6vw,48px);
  margin-bottom:24px;
  animation:starsFade 3s ease forwards;
}
@keyframes starsFade{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
.restart-btn{
  background:transparent;border:1px solid rgba(200,185,160,.3);
  color:rgba(200,185,160,.6);padding:10px 36px;
  font-family:'Zen Kurenaido',cursive;font-size:13px;
  letter-spacing:.2em;cursor:pointer;border-radius:2px;
  transition:all .4s;
}
.restart-btn:hover{border-color:rgba(200,185,160,.7);color:#e8d5b0;}

/* 操作ガイド */
#guide{
  position:fixed;bottom:20px;right:20px;
  font-size:11px;color:rgba(200,185,160,.3);
  letter-spacing:.1em;line-height:2;
  text-align:right;
  transition:opacity 1s;
}
#guide.hide{opacity:0;}

/* ローディング */
#loading{
  position:fixed;inset:0;background:#000;
  display:flex;align-items:center;justify-content:center;
  z-index:200;
  flex-direction:column;gap:16px;
}
.loading-ring{
  width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(232,213,176,.15);
  border-top-color:rgba(232,213,176,.6);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:rgba(200,185,160,.4);letter-spacing:.2em;}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-ring"></div>
  <div class="loading-text">読み込み中...</div>
</div>

<!-- タイトル -->
<div id="title">
  <div class="title-stars" id="titleStars"></div>
  <div class="title-main">星になった君へ</div>
  <div class="title-sub">ある灯台守の、最後の手紙</div>
  <button class="start-btn" onclick="startGame()">はじめる</button>
</div>

<!-- ゲーム canvas -->
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <span class="hud-label">手紙の欠片</span>
  <div class="letter-pip" id="pip0"></div>
  <div class="letter-pip" id="pip1"></div>
  <div class="letter-pip" id="pip2"></div>
  <div class="letter-pip" id="pip3"></div>
  <div class="letter-pip" id="pip4"></div>
</div>

<!-- メッセージ -->
<div id="msgBox">
  <div class="msg-speaker" id="msgSpeaker"></div>
  <div class="msg-text" id="msgText"></div>
  <div class="msg-next" id="msgNext" onclick="nextMsg()">▼ つづき</div>
</div>

<!-- 収集エフェクト -->
<div id="letterCollect">
  <div class="lc-icon">✉</div>
  <div class="lc-text" id="lcText"></div>
</div>

<!-- 操作ガイド -->
<div id="guide">
  WASD / 矢印キー ─ 移動<br>
  マウスドラッグ ─ 視点<br>
  スマホ：スワイプで移動
</div>

<!-- エンディング -->
<div id="ending">
  <div class="ending-stars" id="endStars">✦ ✦ ✦</div>
  <div class="ending-letter" id="endLetter"></div>
  <div class="ending-sig">— おじいちゃんより</div>
  <button class="restart-btn" onclick="location.reload()">もう一度</button>
</div>

<script>
// ═══════════════════════════════════════
// STORY DATA
// ═══════════════════════════════════════
const STORY = {
  intro: [
    { speaker:'', text:'　祖父が逝って、三ヶ月が経った。\n\n　遺品の中に、古い地図があった。\n　そこには、ただ一言——\n\n　「灯台に来なさい」' },
    { speaker:'', text:'　幼い頃、毎夏ここへ来た。\n　祖父はいつも、この灯台に灯りをともしていた。\n\n　「星が迷わないように、な」と、笑いながら。' },
  ],
  letters: [
    { title:'手紙の欠片 ①', speaker:'祖父', text:'おまえが初めて灯台に来た日のことを、覚えているかい。\nおまえは怖くて、ずっと私の手を握っていた。\n\nあの小さな手が、今も忘れられない。' },
    { title:'手紙の欠片 ②', speaker:'祖父', text:'この海は、おまえのお父さんとも来たんだよ。\n彼もまた、星が好きな子だった。\n\n血というのは、不思議なものだね。' },
    { title:'手紙の欠片 ③', speaker:'祖父', text:'灯台の光は、誰かを待っているんじゃない。\n帰る場所を、教えているんだ。\n\nおまえにも、そういう場所があるといい。' },
    { title:'手紙の欠片 ④', speaker:'祖父', text:'最後の冬、ひとりで寂しくなかったかって？\n\n……なかったよ。\nおまえの顔を思い浮かべるだけで、\n部屋がぽかぽかと温かくなったんだ。' },
    { title:'手紙の欠片 ⑤', speaker:'祖父', text:'五枚、集めてくれたね。\nありがとう。\n\nこれが、最後の手紙だ。' },
  ],
  ending: `もし私がいなくなっても、
夜空を見上げてごらん。

一番明るく瞬く星が、
きっと私だよ。

おまえが幸せでいる限り、
私の灯は消えない。

いつまでも、いつまでも——
おまえの帰り道を、照らしているから。`,
};

// ═══════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════
let THREE, renderer, scene, camera;
let gameActive = false;
let msgQueue = [], msgIdx = 0, typing = false, typeTimer = null;
let collectedLetters = 0;
const TOTAL_LETTERS = 5;
let letterObjects = [];
let playerPos, playerVel, playerYaw = 0;
let keys = {};
let mouseDown = false, lastMX = 0, lastMY = 0, cameraPitch = 0.15;
let touchStartX = 0, touchStartY = 0;
let showingMsg = false;
let lightBeam;
let stars = [];
let frameCount = 0;
let endingShown = false;

// タイトル星生成
(function(){
  const c = document.getElementById('titleStars');
  for(let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className = 't-star';
    const size = .5 + Math.random()*2;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      background:rgba(232,213,176,${.3+Math.random()*.7});
      --d:${2+Math.random()*4}s;--delay:-${Math.random()*4}s;
    `;
    c.appendChild(s);
  }
})();

// ═══════════════════════════════════════
// INIT THREE.JS
// ═══════════════════════════════════════
function initThree(){
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  script.onload = () => {
    THREE = window.THREE;
    buildScene();
    gameLoop();
    document.getElementById('loading').style.display = 'none';
  };
  document.head.appendChild(script);
}

function buildScene(){
  const canvas = document.getElementById('c');
  renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.fog = new THREE.FogExp2(0x060a12, 0.018);
  renderer.setClearColor(0x060a12);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 300);

  playerPos = new THREE.Vector3(0, 1.65, 18);
  camera.position.copy(playerPos);

  // ── 照明 ──
  const ambient = new THREE.AmbientLight(0x1a2030, 0.8);
  scene.add(ambient);

  const moon = new THREE.DirectionalLight(0x8090c0, 0.5);
  moon.position.set(-30, 60, -20);
  moon.castShadow = true;
  moon.shadow.mapSize.set(1024,1024);
  moon.shadow.camera.near = 0.5;
  moon.shadow.camera.far = 200;
  moon.shadow.camera.left = -60;
  moon.shadow.camera.right = 60;
  moon.shadow.camera.top = 60;
  moon.shadow.camera.bottom = -60;
  scene.add(moon);

  // 灯台の光
  const lighthouse_light = new THREE.PointLight(0xffeebb, 3, 60);
  lighthouse_light.position.set(0, 28, 0);
  scene.add(lighthouse_light);

  // ── 地面 ──
  const groundGeo = new THREE.PlaneGeometry(200, 200, 32, 32);
  // 地面に波を付ける
  const pos = groundGeo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), z = pos.getZ(i);
    pos.setY(i, Math.sin(x*0.3)*0.4 + Math.cos(z*0.25)*0.3 + (Math.random()-.5)*0.2);
  }
  groundGeo.computeVertexNormals();
  const groundMat = new THREE.MeshLambertMaterial({ color:0x1a2a1a });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ── 海 ──
  const seaGeo = new THREE.PlaneGeometry(300, 300, 48, 48);
  const seaMat = new THREE.MeshLambertMaterial({ color:0x0a1428, transparent:true, opacity:.85 });
  const sea = new THREE.Mesh(seaGeo, seaMat);
  sea.rotation.x = -Math.PI/2;
  sea.position.set(0, -0.5, -60);
  scene.add(sea);
  // 海の波アニメ用
  window._seaGeo = seaGeo;
  window._seaVerts = seaGeo.attributes.position.clone();

  // ── 岩 ──
  buildRocks();

  // ── 灯台 ──
  buildLighthouse();

  // ── 木 ──
  buildTrees();

  // ── 星空 ──
  buildStarfield();

  // ── 手紙の欠片 ──
  buildLetters();

  // イベント
  window.addEventListener('resize', onResize);
  window.addEventListener('keydown', e=>keys[e.code]=true);
  window.addEventListener('keyup',   e=>keys[e.code]=false);
  document.addEventListener('mousedown', e=>{ mouseDown=true; lastMX=e.clientX; lastMY=e.clientY; });
  document.addEventListener('mouseup',   ()=>mouseDown=false);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('touchstart', onTouchStart, {passive:true});
  document.addEventListener('touchmove',  onTouchMove,  {passive:true});
  document.addEventListener('touchend',   ()=>mouseDown=false);
}

function buildRocks(){
  const mat = new THREE.MeshLambertMaterial({ color:0x303040 });
  const positions = [
    [-8,0,5],[10,0,3],[-5,0,-8],[12,0,-12],
    [6,0,8],[-12,0,2],[3,0,-15],[15,0,6],
    [-6,0,15],[-14,0,-6],
  ];
  positions.forEach(([x,,z])=>{
    const h = .5+Math.random();
    const geo = new THREE.DodecahedronGeometry(h, 0);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, h*.3, z);
    mesh.rotation.set(Math.random(),Math.random(),Math.random());
    mesh.castShadow = true;
    scene.add(mesh);
  });
}

function buildLighthouse(){
  const stone = new THREE.MeshLambertMaterial({ color:0xc8c0b0 });
  const dark  = new THREE.MeshLambertMaterial({ color:0x1a1820 });
  const glass = new THREE.MeshLambertMaterial({ color:0xffeebb, emissive:0xffeebb, emissiveIntensity:.5, transparent:true, opacity:.8 });

  // 塔
  const tower = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.5, 22, 12), stone);
  tower.position.set(0, 11, 0);
  tower.castShadow = true;
  scene.add(tower);

  // ストライプ
  for(let i=0;i<4;i++){
    const stripe = new THREE.Mesh(new THREE.CylinderGeometry(1.25, 1.25, .6, 12), dark);
    stripe.position.set(0, 3+i*5, 0);
    scene.add(stripe);
  }

  // ランタン室
  const top = new THREE.Mesh(new THREE.CylinderGeometry(.8, 1.2, 3, 12), stone);
  top.position.set(0, 23.5, 0);
  scene.add(top);

  const lamp = new THREE.Mesh(new THREE.CylinderGeometry(.7, .7, 2, 12), glass);
  lamp.position.set(0, 27, 0);
  scene.add(lamp);

  // 屋根
  const roof = new THREE.Mesh(new THREE.ConeGeometry(.9, 1.5, 12), dark);
  roof.position.set(0, 28.8, 0);
  scene.add(roof);

  // 扉
  const door = new THREE.Mesh(new THREE.BoxGeometry(.7, 1.4, .1), dark);
  door.position.set(0, .7, 1.45);
  scene.add(door);

  // 光のビーム
  const beamGeo = new THREE.ConeGeometry(.2, 40, 8, 1, true);
  const beamMat = new THREE.MeshBasicMaterial({
    color:0xffeebb, transparent:true, opacity:.06,
    side:THREE.DoubleSide, depthWrite:false
  });
  lightBeam = new THREE.Mesh(beamGeo, beamMat);
  lightBeam.position.set(0, 27, 0);
  lightBeam.rotation.x = Math.PI/2;
  scene.add(lightBeam);

  // 足元の石段
  for(let i=0;i<4;i++){
    const step = new THREE.Mesh(new THREE.BoxGeometry(2.4-i*.3, .25, .6), stone);
    step.position.set(0, i*.25, 1.6+i*.3);
    scene.add(step);
  }
}

function buildTrees(){
  const trunk = new THREE.MeshLambertMaterial({ color:0x4a3020 });
  const leaf  = new THREE.MeshLambertMaterial({ color:0x1a3020 });
  const positions = [[-15,0,10],[-18,0,3],[-13,0,-5],[16,0,-3],[18,0,8],[14,0,15],[-10,0,18]];
  positions.forEach(([x,,z])=>{
    const h = 3+Math.random()*3;
    const t = new THREE.Mesh(new THREE.CylinderGeometry(.2,.3,h,6), trunk);
    t.position.set(x, h/2, z);
    t.castShadow = true;
    scene.add(t);
    const r = 1.2+Math.random()*.8;
    const crown = new THREE.Mesh(new THREE.ConeGeometry(r, r*1.8, 7), leaf);
    crown.position.set(x, h+r*.5, z);
    crown.castShadow = true;
    scene.add(crown);
  });
}

function buildStarfield(){
  const geo = new THREE.BufferGeometry();
  const cnt = 2000;
  const pos = new Float32Array(cnt*3);
  const col = new Float32Array(cnt*3);
  for(let i=0;i<cnt;i++){
    const theta = Math.random()*Math.PI*2;
    const phi   = Math.acos(2*Math.random()-1);
    const r = 180 + Math.random()*20;
    pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1] = Math.abs(r*Math.cos(phi));
    pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
    const warm = Math.random();
    col[i*3]   = .7+warm*.3;
    col[i*3+1] = .7+warm*.2;
    col[i*3+2] = .8+warm*.2;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({ size:.4, vertexColors:true, transparent:true, opacity:.9 });
  scene.add(new THREE.Points(geo, mat));
  window._starGeo = geo;
  window._starPos = geo.attributes.position.array;
  window._starBase = pos.slice();
}

function buildLetters(){
  // 5つの手紙を島に散らばせる
  const positions = [
    [-8, 1, -2],
    [10, 1, -5],
    [-3, 1, -12],
    [8, 1, 8],
    [-12, 1, 12],
  ];
  positions.forEach((pos, i)=>{
    const group = new THREE.Group();

    // 光の柱
    const pillarGeo = new THREE.CylinderGeometry(.02, .1, 4, 8, 1, true);
    const pillarMat = new THREE.MeshBasicMaterial({
      color:0xffeebb, transparent:true, opacity:.25,
      side:THREE.DoubleSide, depthWrite:false
    });
    const pillar = new THREE.Mesh(pillarGeo, pillarMat);
    pillar.position.y = 2;
    group.add(pillar);

    // 光の球
    const orbGeo = new THREE.SphereGeometry(.15, 8, 8);
    const orbMat = new THREE.MeshBasicMaterial({ color:0xffeebb });
    const orb = new THREE.Mesh(orbGeo, orbMat);
    orb.position.y = 1.2;
    group.add(orb);

    // 光のハロ
    const haloGeo = new THREE.RingGeometry(.2, .35, 16);
    const haloMat = new THREE.MeshBasicMaterial({
      color:0xffeebb, transparent:true, opacity:.3,
      side:THREE.DoubleSide, depthWrite:false
    });
    const halo = new THREE.Mesh(haloGeo, haloMat);
    halo.position.y = 1.2;
    halo.rotation.x = -Math.PI/2;
    group.add(halo);

    group.position.set(...pos);
    group.userData = { letterIdx: i, collected: false };
    scene.add(group);
    letterObjects.push(group);
  });
}

// ═══════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════
function gameLoop(){
  requestAnimationFrame(gameLoop);
  if(!gameActive) return;
  frameCount++;

  const t = frameCount * .016;

  // 海の波
  if(window._seaGeo){
    const p = window._seaGeo.attributes.position;
    const base = window._seaVerts;
    for(let i=0;i<p.count;i++){
      const bx = base.getX(i), bz = base.getZ(i);
      p.setY(i, base.getY(i) + Math.sin(bx*.5+t)*0.15 + Math.cos(bz*.4+t*.7)*0.1);
    }
    p.needsUpdate = true;
    window._seaGeo.computeVertexNormals();
  }

  // 灯台ビーム回転
  if(lightBeam){
    lightBeam.rotation.y = t * .5;
    lightBeam.material.opacity = .04 + Math.sin(t*.8)*.02;
  }

  // 手紙エフェクト
  letterObjects.forEach((g,i)=>{
    if(g.userData.collected) return;
    g.position.y = letterObjects[i].userData.baseY + Math.sin(t*1.5 + i)*0.15;
    if(!g.userData.baseY) g.userData.baseY = g.position.y;
    g.rotation.y = t * .8 + i * 1.2;
    // ハロスケール
    const halo = g.children[2];
    const s = 1 + Math.sin(t*2+i)*.2;
    halo.scale.set(s,s,s);
  });

  // 星のきらめき
  if(window._starPos && frameCount%3===0){
    const arr = window._starPos;
    const base = window._starBase;
    for(let i=0;i<arr.length;i+=3){
      arr[i+1] = base[i+1] + Math.sin(t*.3+i)*.2;
    }
    window._starGeo.attributes.position.needsUpdate = true;
  }

  // プレイヤー移動
  if(!showingMsg) updatePlayer(t);

  // 手紙との距離チェック
  checkLetterPickup();

  renderer.render(scene, camera);
}

function updatePlayer(t){
  const speed = .07;
  const forward = new THREE.Vector3(-Math.sin(playerYaw), 0, -Math.cos(playerYaw));
  const right   = new THREE.Vector3( Math.cos(playerYaw), 0, -Math.sin(playerYaw));

  const move = new THREE.Vector3();
  if(keys['KeyW']||keys['ArrowUp'])    move.addScaledVector(forward, speed);
  if(keys['KeyS']||keys['ArrowDown'])  move.addScaledVector(forward,-speed);
  if(keys['KeyA']||keys['ArrowLeft'])  move.addScaledVector(right,  -speed);
  if(keys['KeyD']||keys['ArrowRight']) move.addScaledVector(right,   speed);

  playerPos.add(move);
  // 境界制限
  playerPos.x = Math.max(-22, Math.min(22, playerPos.x));
  playerPos.z = Math.max(-18, Math.min(22, playerPos.z));
  // 灯台との衝突
  if(Math.sqrt(playerPos.x**2 + playerPos.z**2) < 2.2){
    playerPos.sub(move);
  }

  camera.position.set(playerPos.x, playerPos.y, playerPos.z);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = playerYaw;
  camera.rotation.x = -cameraPitch;
}

function checkLetterPickup(){
  letterObjects.forEach((g, i)=>{
    if(g.userData.collected) return;
    const dx = playerPos.x - g.position.x;
    const dz = playerPos.z - g.position.z;
    const dist = Math.sqrt(dx*dx+dz*dz);
    if(dist < 2.5){
      collectLetter(i);
    }
  });
}

function collectLetter(i){
  const g = letterObjects[i];
  g.userData.collected = true;
  collectedLetters++;

  // ビジュアル消去
  g.visible = false;

  // pip 更新
  document.getElementById(`pip${i}`).classList.add('collected');

  // 収集エフェクト
  const el = document.getElementById('letterCollect');
  document.getElementById('lcText').textContent = STORY.letters[i].title;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);

  // メッセージ表示
  setTimeout(()=>{
    showMessage([STORY.letters[i]], ()=>{
      if(collectedLetters >= TOTAL_LETTERS){
        setTimeout(showEnding, 800);
      }
    });
  }, 1800);
}

// ═══════════════════════════════════════
// MESSAGE SYSTEM
// ═══════════════════════════════════════
let _msgCallback = null;
function showMessage(lines, callback){
  showingMsg = true;
  msgQueue = lines;
  msgIdx = 0;
  _msgCallback = callback;
  showCurrentMsg();
  document.getElementById('msgBox').classList.add('show');
  document.getElementById('guide').classList.add('hide');
}

function showCurrentMsg(){
  if(msgIdx >= msgQueue.length){
    closeMsg();
    return;
  }
  const m = msgQueue[msgIdx];
  document.getElementById('msgSpeaker').textContent = m.speaker ? `— ${m.speaker}` : '';
  document.getElementById('msgNext').style.display = 'none';
  typeMessage(m.text, ()=>{
    document.getElementById('msgNext').style.display = 'block';
  });
}

function typeMessage(text, done){
  const el = document.getElementById('msgText');
  el.innerHTML = '';
  let i = 0;
  typing = true;
  clearInterval(typeTimer);
  typeTimer = setInterval(()=>{
    if(i < text.length){
      el.innerHTML = text.slice(0,++i).replace(/\n/g,'<br>') + '<span class="msg-cursor"></span>';
    } else {
      clearInterval(typeTimer);
      el.innerHTML = text.replace(/\n/g,'<br>');
      typing = false;
      if(done) done();
    }
  }, 45);
}

function nextMsg(){
  if(typing){
    clearInterval(typeTimer);
    typing = false;
    const m = msgQueue[msgIdx];
    document.getElementById('msgText').innerHTML = m.text.replace(/\n/g,'<br>');
    document.getElementById('msgNext').style.display = 'block';
    return;
  }
  msgIdx++;
  if(msgIdx < msgQueue.length){
    showCurrentMsg();
  } else {
    closeMsg();
  }
}

function closeMsg(){
  document.getElementById('msgBox').classList.remove('show');
  document.getElementById('guide').classList.remove('hide');
  showingMsg = false;
  if(_msgCallback){ _msgCallback(); _msgCallback=null; }
}

// ═══════════════════════════════════════
// ENDING
// ═══════════════════════════════════════
function showEnding(){
  if(endingShown) return;
  endingShown = true;
  gameActive = false;

  const el = document.getElementById('ending');
  document.getElementById('endLetter').textContent = STORY.ending;
  el.classList.add('show');
  document.getElementById('guide').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
}

// ═══════════════════════════════════════
// INPUT HANDLERS
// ═══════════════════════════════════════
function onMouseMove(e){
  if(!mouseDown || !gameActive) return;
  const dx = e.clientX - lastMX;
  const dy = e.clientY - lastMY;
  playerYaw   += dx * .003;
  cameraPitch  = Math.max(-.3, Math.min(.6, cameraPitch + dy*.002));
  lastMX = e.clientX;
  lastMY = e.clientY;
}
function onTouchStart(e){
  const t = e.touches[0];
  mouseDown = true;
  touchStartX = lastMX = t.clientX;
  touchStartY = lastMY = t.clientY;
}
function onTouchMove(e){
  if(!mouseDown || !gameActive) return;
  const t = e.touches[0];
  const dx = t.clientX - lastMX;
  const dy = t.clientY - lastMY;
  playerYaw  += dx * .005;
  cameraPitch = Math.max(-.2, Math.min(.5, cameraPitch + dy*.003));
  // スワイプで前進
  const totalDy = t.clientY - touchStartY;
  if(Math.abs(totalDy) > 5){
    const forward = new THREE.Vector3(-Math.sin(playerYaw), 0, -Math.cos(playerYaw));
    playerPos.addScaledVector(forward, -totalDy*.0025);
    touchStartY = t.clientY;
  }
  lastMX = t.clientX;
  lastMY = t.clientY;
}
function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ═══════════════════════════════════════
// START
// ═══════════════════════════════════════
function startGame(){
  document.getElementById('title').classList.add('fade');
  setTimeout(()=>{
    document.getElementById('title').style.display='none';
    document.getElementById('hud').classList.add('show');
    document.getElementById('guide').style.display='block';
    gameActive = true;
    // イントロメッセージ
    setTimeout(()=>{
      showMessage(STORY.intro);
    }, 1200);
  }, 1500);
}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
initThree();
