<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AURA RNG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@300;700&display=swap');

:root{
  --bg:#04050d;--s1:#080c1a;--s2:#0c1228;--card:#0f1830;
  --border:#1a2640;--border2:#243350;
  --text:#ddeeff;--muted:#2a4060;--dim:#4a6888;
  --gold:#f0b429;--gold2:#ffe08a;
  --c0:#aab8c8; /* common */
  --c1:#5de86c; /* uncommon */
  --c2:#38c8f5; /* rare */
  --c3:#c084fc; /* epic */
  --c4:#fbbf24; /* legendary */
  --c5:#f43f5e; /* mythic */
  --c6:#ffffff; /* divine */
  --c7:#ff6b00; /* corrupted */
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Rajdhani',sans-serif;color:var(--text);display:flex;flex-direction:column;user-select:none;}

/* ━━━ CANVAS ━━━ */
#bg{position:fixed;inset:0;z-index:0;}
#fxCanvas{position:fixed;inset:0;z-index:2;pointer-events:none;}

/* ━━━ LOBBY ━━━ */
#lobby{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* TOP BAR */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  height:54px;
  background:linear-gradient(180deg,rgba(4,5,13,.95) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;gap:10px;
}
.logo{
  font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.15em;
  background:linear-gradient(135deg,#fff,#a0c0ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.topbar-mid{flex:1;display:flex;justify-content:center;}
.coins-wrap{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:5px 14px;
  font-size:14px;font-weight:700;color:var(--gold2);
}
.topbar-right{display:flex;gap:8px;}
.tbtn{
  height:36px;padding:0 14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);
  border-radius:8px;
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  color:var(--text);cursor:pointer;letter-spacing:.05em;
  transition:all .15s;display:flex;align-items:center;gap:5px;
}
.tbtn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);}
.tbtn.lit{border-color:rgba(255,200,80,.4);color:var(--gold);box-shadow:0 0 12px rgba(240,180,41,.2);}

/* LUCK DISPLAY */
#luckChip{
  position:fixed;top:62px;right:14px;z-index:20;
  background:rgba(4,5,13,.7);border:1px solid rgba(255,255,255,.08);
  border-radius:6px;padding:4px 10px;
  font-size:10px;letter-spacing:.1em;font-weight:700;
  color:#8899bb;pointer-events:none;
}
#luckChip span{color:#a78bfa;}

/* SPIN CENTER */
.spin-center{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  pointer-events:none;
}
.equipped-aura-name{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(13px,3vw,18px);
  letter-spacing:.3em;opacity:.4;
  transition:all .5s;
}

#spinBtn{
  pointer-events:all;
  position:relative;
  width:min(220px,58vw);
  height:min(220px,58vw);
  border-radius:50%;
  border:none;cursor:pointer;
  background:radial-gradient(circle at 35% 35%,#1a2a50,#080c1a);
  box-shadow:0 0 0 2px rgba(255,255,255,.06),0 0 40px rgba(80,120,255,.15),0 20px 60px rgba(0,0,0,.6);
  transition:transform .1s,box-shadow .3s;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:6px;
}
#spinBtn:hover{transform:scale(1.04);box-shadow:0 0 0 2px rgba(255,255,255,.12),0 0 60px rgba(100,140,255,.25),0 20px 70px rgba(0,0,0,.7);}
#spinBtn:active{transform:scale(.95);}
#spinBtn.spinning{pointer-events:none;animation:spinPulse .15s ease-in-out;}
@keyframes spinPulse{0%{transform:scale(1);}50%{transform:scale(.9);}100%{transform:scale(1);}}
.spin-label{font-family:'Bebas Neue',cursive;font-size:clamp(22px,5vw,32px);letter-spacing:.25em;color:#fff;pointer-events:none;}
.spin-cost{font-size:11px;color:rgba(200,220,255,.4);letter-spacing:.1em;pointer-events:none;}
/* spinning ring around button */
.spin-ring{
  position:absolute;inset:-4px;border-radius:50%;
  border:2px solid transparent;
  background:conic-gradient(rgba(100,140,255,.5),transparent,transparent,rgba(100,140,255,.5)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;
  animation:rotateSpin 3s linear infinite;pointer-events:none;
}
@keyframes rotateSpin{to{transform:rotate(360deg);}}

/* LAST ROLL */
#lastRoll{
  pointer-events:none;
  font-size:11px;letter-spacing:.1em;
  color:rgba(200,220,255,.35);
  transition:color .4s;
  display:flex;align-items:center;gap:6px;
}
#lastRoll .lr-name{font-weight:700;}

/* BOTTOM COST */
.bottom-info{
  position:fixed;bottom:24px;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  pointer-events:none;z-index:20;
}
.roll-info-row{font-size:11px;color:rgba(200,220,255,.25);letter-spacing:.1em;}

/* ━━━ ROLL OVERLAY ━━━ */
#rollOverlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,.0);
  display:none;align-items:center;justify-content:center;
  transition:background .3s;
}
#rollOverlay.open{display:flex;background:rgba(0,0,0,.88);}
#rollCard{
  position:relative;overflow:hidden;
  width:min(340px,90vw);
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:32px 24px 24px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  box-shadow:0 30px 80px rgba(0,0,0,.7);
  animation:cardDrop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes cardDrop{from{transform:scale(.7) translateY(30px);opacity:0;}to{transform:none;opacity:1;}}
#rollBg{position:absolute;inset:0;pointer-events:none;border-radius:20px;overflow:hidden;}
.roll-rarity-tag{
  font-family:'Bebas Neue',cursive;
  font-size:11px;letter-spacing:.4em;
  padding:3px 12px;border-radius:20px;
  border:1px solid currentColor;opacity:.8;
}
.roll-icon{font-size:56px;line-height:1;filter:drop-shadow(0 0 20px currentColor);}
.roll-name{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(28px,6vw,38px);
  letter-spacing:.08em;text-align:center;
  text-shadow:0 0 30px currentColor;
}
.roll-odds-text{font-size:12px;color:rgba(200,220,255,.4);letter-spacing:.08em;}
.roll-new{
  background:var(--c1);color:#000;
  font-size:10px;font-weight:700;letter-spacing:.15em;
  padding:3px 12px;border-radius:20px;
  animation:popIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}
.roll-coins{font-size:12px;color:var(--gold);letter-spacing:.05em;}
.roll-btn{
  margin-top:8px;width:100%;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);
  border-radius:10px;padding:12px;
  font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:.15em;
  color:var(--text);cursor:pointer;transition:all .15s;
}
.roll-btn:hover{background:rgba(255,255,255,.12);}

/* ━━━ PANELS (BAG / SHOP) ━━━ */
.panel{
  position:fixed;inset:0;z-index:40;
  background:rgba(4,5,13,.97);
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
.panel.open{transform:none;}
.panel-head{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
  background:var(--s1);border-bottom:1px solid var(--border);
}
.panel-back{
  background:var(--card);border:1px solid var(--border2);
  border-radius:8px;padding:6px 14px;
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  color:var(--dim);cursor:pointer;transition:all .15s;
}
.panel-back:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.panel-title{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:.15em;flex:1;}
.panel-sub{font-size:12px;color:var(--dim);letter-spacing:.05em;}

/* BAG GRID */
.bag-body{flex:1;overflow-y:auto;padding:12px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;align-content:start;}
.bag-body::-webkit-scrollbar{width:3px;}
.bag-body::-webkit-scrollbar-thumb{background:var(--border2);}
.aura-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:10px 8px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.aura-card:hover{transform:translateY(-2px);border-color:var(--border2);}
.aura-card.on{border-width:1.5px;}
.aura-card.on::before{
  content:'▶ 装備中';position:absolute;top:0;right:0;
  font-size:8px;font-weight:700;letter-spacing:.05em;
  padding:3px 7px;border-radius:0 10px 0 8px;
  background:currentColor;color:#000;opacity:.9;
}
.aura-preview{
  width:64px;height:64px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;position:relative;overflow:hidden;
}
.aura-name{font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:.06em;text-align:center;}
.aura-rar{font-size:8px;letter-spacing:.15em;opacity:.6;text-align:center;}
.aura-prob{font-size:8px;color:rgba(200,220,255,.3);letter-spacing:.05em;}
.aura-cnt{position:absolute;bottom:6px;left:7px;font-size:8px;color:var(--dim);font-weight:700;}
.aura-equip{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:6px;padding:5px;
  font-size:11px;font-weight:700;color:var(--text);
  cursor:pointer;transition:all .12s;letter-spacing:.05em;
}
.aura-equip:hover{background:rgba(255,255,255,.1);}
.aura-equip.off-btn{background:rgba(200,80,80,.1);border-color:rgba(200,80,80,.25);color:#f87171;}
.bag-empty{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 20px;gap:10px;color:var(--muted);
}

/* SHOP */
.shop-body{flex:1;overflow-y:auto;}
.shop-body::-webkit-scrollbar{width:3px;}
.shop-body::-webkit-scrollbar-thumb{background:var(--border2);}
.shop-section{padding:12px 14px 4px;}
.shop-sec-title{font-size:9px;letter-spacing:.25em;color:var(--dim);margin-bottom:8px;font-weight:700;}
.luck-meter{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;margin-bottom:12px;
}
.luck-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.luck-val{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:.1em;color:#a78bfa;}
.luck-track{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.luck-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#7c3aed,#c084fc,#22d3ee);transition:width .6s cubic-bezier(.4,0,.2,1);}
.sitem{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;
  transition:border-color .15s;
}
.sitem:hover{border-color:var(--border2);}
.sicon{font-size:28px;width:42px;text-align:center;flex-shrink:0;}
.sinfo{flex:1;min-width:0;}
.sname{font-weight:700;font-size:13px;letter-spacing:.04em;margin-bottom:2px;}
.sdesc{font-size:11px;color:var(--dim);line-height:1.5;}
.stag{font-size:9px;font-weight:700;letter-spacing:.1em;margin-top:3px;}
.sbuy{
  flex-shrink:0;
  background:rgba(240,180,41,.08);
  border:1px solid rgba(240,180,41,.3);
  border-radius:8px;padding:8px 12px;
  font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:.08em;
  color:var(--gold);cursor:pointer;
  transition:all .18s;text-align:center;min-width:70px;
}
.sbuy:hover{background:rgba(240,180,41,.15);box-shadow:0 0 16px rgba(240,180,41,.2);}
.sbuy:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;}
.sbuy.owned{background:rgba(74,222,128,.07);border-color:rgba(74,222,128,.3);color:var(--c1);}
.sbuy.active-pot{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);color:var(--c5);}

/* ━━━ TOAST ━━━ */
#toast{
  position:fixed;bottom:-50px;left:50%;transform:translateX(-50%);
  z-index:999;background:rgba(15,24,48,.95);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:8px 20px;
  font-size:12px;font-weight:700;letter-spacing:.06em;
  white-space:nowrap;pointer-events:none;
  transition:bottom .32s cubic-bezier(.34,1.56,.64,1);
}
#toast.up{bottom:20px;}

/* ━━━ EFFECTS (CSS particle layers) ━━━ */
/* Common: simple grey dust */
@keyframes dustUp{0%{transform:translateY(0) scale(1);opacity:.5;}100%{transform:translateY(-100vh) scale(.2);opacity:0;}}
.p-dust{position:absolute;border-radius:50%;background:#8899aa;animation:dustUp var(--d) linear infinite var(--del);}

/* Uncommon: green sparkles */
@keyframes sparkUp{0%{transform:translateY(0) rotate(0) scale(1);opacity:.7;}100%{transform:translateY(-90vh) rotate(180deg) scale(.3);opacity:0;}}
.p-spark{position:absolute;width:5px;height:5px;background:#5de86c;box-shadow:0 0 6px #5de86c;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:sparkUp var(--d) ease-in-out infinite var(--del);}

/* Rare: ice crystals */
@keyframes iceFloat{0%{transform:translateY(0) translateX(0) rotate(0);opacity:.9;}50%{transform:translateY(-45vh) translateX(calc(var(--sx)*28px)) rotate(180deg);opacity:1;}100%{transform:translateY(-90vh) translateX(0) rotate(360deg);opacity:0;}}
.p-ice{position:absolute;width:7px;height:7px;background:radial-gradient(#e0f9ff,#38c8f5);box-shadow:0 0 10px #38c8f5;border-radius:1px;animation:iceFloat var(--d) ease-in-out infinite var(--del);}

/* Epic: purple orbs + lightning */
@keyframes orbSwirl{0%{transform:translate(0,0) scale(1);opacity:.95;}40%{transform:translate(calc(var(--tx)*50px),calc(var(--ty)*-35vh)) scale(1.4);opacity:1;}100%{transform:translate(calc(var(--tx)*-20px),-95vh) scale(.2);opacity:0;}}
.p-orb{position:absolute;border-radius:50%;background:radial-gradient(#f5d0fe,#a855f7);box-shadow:0 0 14px #a855f7,0 0 28px rgba(168,85,247,.5);animation:orbSwirl var(--d) ease-in-out infinite var(--del);}
@keyframes zapFlash{0%,100%{opacity:0;}4%{opacity:1;}8%{opacity:0;}52%{opacity:0;}56%{opacity:.7;}60%{opacity:0;}}
.p-zap{position:absolute;width:1.5px;background:linear-gradient(180deg,transparent,#c084fc,#f0abfc,transparent);box-shadow:0 0 8px #c084fc;border-radius:1px;animation:zapFlash var(--d) linear infinite var(--del);}

/* Legendary: gold stars + rings */
@keyframes starRise{0%{transform:translateY(0) rotate(0) scale(1);opacity:1;}100%{transform:translateY(-95vh) rotate(540deg) scale(.3);opacity:0;}}
.p-star{position:absolute;background:#f0b429;box-shadow:0 0 10px #f0b429,0 0 20px rgba(240,180,41,.5);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:starRise var(--d) ease-in-out infinite var(--del);}
@keyframes ringExpand{0%{transform:translate(-50%,-50%) scale(0);opacity:.7;}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0;}}
.p-ring{position:absolute;border-radius:50%;border:2px solid rgba(240,180,41,.4);box-shadow:0 0 20px rgba(240,180,41,.2);animation:ringExpand var(--d) ease-out infinite var(--del);top:50%;left:50%;}

/* Mythic: dark flame + aurora */
@keyframes flameRise{0%,100%{transform:scaleX(1) scaleY(1);opacity:.9;}50%{transform:scaleX(1.6) scaleY(1.4);opacity:1;}}
.p-flame{position:absolute;bottom:0;border-radius:50% 50% 0 0;filter:blur(3px);animation:flameRise var(--d) ease-in-out infinite var(--del);}
@keyframes auroraWave{0%,100%{opacity:.5;transform:skewY(-.5deg) translateY(0);}50%{opacity:.9;transform:skewY(.5deg) translateY(-6px);}}
.p-aurora{position:fixed;top:0;left:0;right:0;height:38vh;pointer-events:none;animation:auroraWave var(--d) ease-in-out infinite var(--del);}

/* Divine: white beams + holy cross + divine dust */
@keyframes beamFade{0%,100%{opacity:0;scaleY:0;}20%,80%{opacity:.8;}}
.p-beam{position:absolute;top:0;width:2px;background:linear-gradient(180deg,rgba(255,255,255,.9),transparent);box-shadow:0 0 12px rgba(255,255,255,.6);animation:beamFade var(--d) ease-in-out infinite var(--del);}
@keyframes holyGlow{0%,100%{opacity:.15;}50%{opacity:.4;}}
.p-cross-h{position:fixed;top:50%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),rgba(255,255,255,.6),rgba(255,255,255,.3),transparent);animation:holyGlow 4s ease-in-out infinite;pointer-events:none;}
.p-cross-v{position:fixed;left:50%;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.3),rgba(255,255,255,.6),rgba(255,255,255,.3),transparent);animation:holyGlow 4s ease-in-out infinite .5s;pointer-events:none;}
@keyframes divDust{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(calc(var(--tx)*120px),calc(var(--ty)*-120px)) scale(0);opacity:0;}}
.p-ddust{position:absolute;border-radius:50%;background:radial-gradient(#fff,#c7d2fe);box-shadow:0 0 10px #fff,0 0 20px rgba(199,210,254,.8);animation:divDust var(--d) ease-out infinite var(--del);}

/* Corrupted: blood-red chaos */
@keyframes corruptSwirl{0%{transform:translate(0,0) rotate(0) scale(1);opacity:.9;}33%{transform:translate(calc(var(--tx)*80px),calc(var(--ty)*-30vh)) rotate(200deg) scale(1.5);}100%{transform:translate(calc(var(--tx)*-40px),-95vh) rotate(720deg) scale(0);opacity:0;}}
.p-corrupt{position:absolute;border-radius:50%;background:radial-gradient(#ff4455,#800020);box-shadow:0 0 14px #ff2233,0 0 30px rgba(255,34,51,.5);animation:corruptSwirl var(--d) ease-in-out infinite var(--del);}
@keyframes glitchFlash{0%,100%{opacity:0;}3%{opacity:1;transform:translateX(-3px);}6%{opacity:0;}50%{opacity:0;}53%{opacity:.5;transform:translateX(3px);}56%{opacity:0;}}
.p-glitch{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(255,0,0,.04),transparent,rgba(255,0,0,.04));pointer-events:none;animation:glitchFlash var(--d) linear infinite var(--del);}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fxCanvas"></canvas>

<!-- LOBBY EFFECT LAYER -->
<div id="fxLayer" style="position:fixed;inset:0;z-index:3;pointer-events:none;overflow:hidden;"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">AURA RNG</div>
  <div class="topbar-mid">
    <div class="coins-wrap">🪙 <span id="coinVal">250</span></div>
  </div>
  <div class="topbar-right">
    <button class="tbtn" id="bagTbtn" onclick="openPanel('bag')">🎒 <span id="bagLabel">バッグ</span></button>
    <button class="tbtn" onclick="openPanel('shop')">🏪 ショップ</button>
  </div>
</div>
<div id="luckChip">LUCK <span id="luckVal">×1.00</span></div>

<!-- LOBBY CENTER -->
<div id="lobby">
  <div class="spin-center">
    <div class="equipped-aura-name" id="equippedLabel">— NO AURA —</div>
    <button id="spinBtn" onclick="doSpin()">
      <div class="spin-ring"></div>
      <div class="spin-label">SPIN</div>
      <div class="spin-cost">🪙10 / 1回</div>
    </button>
    <div id="lastRoll">スピンして運命を試そう</div>
  </div>
</div>

<div class="bottom-info">
  <div class="roll-info-row" id="totalRolls">総ロール数: 0</div>
</div>

<!-- ROLL RESULT -->
<div id="rollOverlay" onclick="closeRoll()">
  <div id="rollCard" onclick="e=>e.stopPropagation()">
    <div id="rollBg"></div>
    <div class="roll-rarity-tag" id="rrTag">COMMON</div>

<script>
// ═══════════════════════════════════════════
// AURA DATA
// ═══════════════════════════════════════════
const AURAS = [

  { id:'storm',    name:'STORM',      rar:'EPIC',       col:'#818cf8', icon:'⛈️', prob:500,     coins:55,  fx:'epic'      },
  { id:'solar',    name:'SOLAR',      rar:'LEGENDARY',  col:'#fbbf24', icon:'☀️', prob:2000,    coins:200, fx:'legendary' },
  { id:'nebula',   name:'NEBULA',     rar:'LEGENDARY',  col:'#fb923c', icon:'🌌', prob:3500,    coins:200, fx:'legendary' },
  { id:'abyss',    name:'ABYSS',      rar:'MYTHIC',     col:'#f43f5e', icon:'🕳️', prob:15000,   coins:600, fx:'mythic'    },
  { id:'chaos',    name:'CHAOS',      rar:'MYTHIC',     col:'#ec4899', icon:'🌀', prob:25000,   coins:600, fx:'mythic'    },
  { id:'seraph',   name:'SERAPH',     rar:'DIVINE',     col:'#f8fafc', icon:'✝️', prob:120000,  coins:2000,fx:'divine'    },
  { id:'genesis',  name:'GENESIS',    rar:'DIVINE',     col:'#e2e8f0', icon:'⚜️', prob:600000,  coins:2000,fx:'divine'    },
  { id:'glitch',   name:'GLITCH',     rar:'CORRUPTED',  col:'#ff3344', icon:'⚠️', prob:2000000, coins:8000,fx:'corrupted' },
];

const RAR_ORDER = ['COMMON','UNCOMMON','RARE','EPIC','LEGENDARY','MYTHIC','DIVINE','CORRUPTED'];
const RAR_COL   = {COMMON:'#9ca3af',UNCOMMON:'#4ade80',RARE:'#38bdf8',EPIC:'#c084fc',LEGENDARY:'#fbbf24',MYTHIC:'#f43f5e',DIVINE:'#f8fafc',CORRUPTED:'#ff3344'};

const POTIONS = [
  { id:'p1', name:'スモールポーション', icon:'🧪', desc:'ラック ×1.5（5分）', cost:30,  mult:1.5, dur:5*60*1000  },
  { id:'p2', name:'ミディアムポーション',icon:'⚗️', desc:'ラック ×2.5（3分）', cost:75,  mult:2.5, dur:3*60*1000  },
  { id:'p3', name:'ラージポーション',   icon:'🔮', desc:'ラック ×4.0（2分）', cost:160, mult:4.0, dur:2*60*1000  },
  { id:'p4', name:'メガポーション',     icon:'💜', desc:'ラック ×8.0（1分）', cost:380, mult:8.0, dur:1*60*1000  },
  { id:'p5', name:'ゴッドポーション',   icon:'🌟', desc:'ラック ×20.0（30秒）',cost:900, mult:20.0,dur:30*1000   },
];
const GEAR = [
  { id:'g1', name:'ラッキーチャーム',   icon:'🍀', desc:'永続 ラック ×1.5',    cost:200,   mult:1.5  },
  { id:'g2', name:'ラッキークラウン',   icon:'👑', desc:'永続 ラック ×2.0',    cost:500,   mult:2.0  },
  { id:'g3', name:'スターオーブ',       icon:'⭐', desc:'永続 ラック ×4.0',    cost:1500,  mult:4.0  },
  { id:'g4', name:'ギャラクシーソウル', icon:'🌌', desc:'永続 ラック ×8.0',    cost:5000,  mult:8.0  },
  { id:'g5', name:'ゴッドクリスタル',   icon:'💠', desc:'永続 ラック ×20.0',   cost:20000, mult:20.0 },
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state = {
  coins: 250, totalRolls: 0,
  inv: {},         // auraId -> count
  equipped: null,  // auraId
  ownedGear: {},   // gearId -> true
  equippedGear: null,
  potion: null,    // {id,mult,endsAt}
};

function getLuck(){
  let m = 1;
  if(state.equippedGear){ const g=GEAR.find(g=>g.id===state.equippedGear); if(g) m*=g.mult; }
  if(state.potion && Date.now()<state.potion.endsAt) m*=state.potion.mult;
  else state.potion=null;
  return m;
}

// ═══════════════════════════════════════════
// BACKGROUND CANVAS
// ═══════════════════════════════════════════
(()=>{
  const cv=document.getElementById('bg'),ctx=cv.getContext('2d');
  const stars=[];
  let W,H;
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize();addEventListener('resize',resize);
  for(let i=0;i<250;i++) stars.push({x:Math.random(),y:Math.random(),r:.3+Math.random()*1.3,s:Math.random()*6.28,sp:.001+Math.random()*.004});
  let t=0;
  (function loop(){
    requestAnimationFrame(loop);t++;
    ctx.fillStyle='#04050d';ctx.fillRect(0,0,W,H);
    // nebula
    const ng=ctx.createRadialGradient(W*.3,H*.4,0,W*.3,H*.4,W*.5);
    ng.addColorStop(0,'rgba(50,20,100,.05)');ng.addColorStop(1,'transparent');
    ctx.fillStyle=ng;ctx.fillRect(0,0,W,H);
    const ng2=ctx.createRadialGradient(W*.7,H*.6,0,W*.7,H*.6,W*.4);
    ng2.addColorStop(0,'rgba(20,50,120,.04)');ng2.addColorStop(1,'transparent');
    ctx.fillStyle=ng2;ctx.fillRect(0,0,W,H);
    // stars
    stars.forEach(s=>{
      const a=.2+.8*Math.abs(Math.sin(s.s+t*s.sp));
      ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,210,255,${a})`;ctx.fill();
    });
  })();
})();

// ═══════════════════════════════════════════
// SPIN
// ═══════════════════════════════════════════
const SPIN_COST=10;
function doSpin(){
  if(state.coins<SPIN_COST){showToast('コインが足りません！🪙');return;}
  state.coins-=SPIN_COST;
  state.totalRolls++;
  updateCoins();

  const luck=getLuck();
  const wts=AURAS.map(a=>luck/a.prob);
  const tot=wts.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot, picked=AURAS[0];
  for(let i=0;i<AURAS.length;i++){r-=wts[i];if(r<=0){picked=AURAS[i];break;}}

  const isNew=!state.inv[picked.id];
  state.inv[picked.id]=(state.inv[picked.id]||0)+1;
  const earn=isNew?picked.coins:Math.max(1,Math.floor(picked.coins*.25));
  state.coins+=earn;
  updateCoins();
  document.getElementById('totalRolls').textContent=`総ロール数: ${state.totalRolls.toLocaleString()}`;

  showRoll(picked,isNew,earn,luck);
  updateLastRoll(picked);
  save();
}

function showRoll(a,isNew,earn,luck){
  const ov=document.getElementById('rollOverlay');
  document.getElementById('rrTag').textContent=a.rar;
  document.getElementById('rrTag').style.color=a.col;
  document.getElementById('rrTag').style.borderColor=a.col+'66';
  document.getElementById('rrIcon').textContent=a.icon;
  document.getElementById('rrIcon').style.color=a.col;
  document.getElementById('rrName').textContent=a.name;
  document.getElementById('rrName').style.color=a.col;
  const effProb=Math.round(a.prob/luck);
  document.getElementById('rrOdds').textContent=`1/${fmt(a.prob)}  （ラック後: 1/${fmt(effProb)}）`;
  document.getElementById('rrNew').style.display=isNew?'block':'none';
  document.getElementById('rrCoins').textContent=`🪙 +${earn}コイン獲得`;

  // bg effect inside card
  buildCardFx(a);
  document.getElementById('spinBtn').classList.add('spinning');
  setTimeout(()=>document.getElementById('spinBtn').classList.remove('spinning'),200);
  ov.classList.add('open');
}

function buildCardFx(a){

// ═══════════════════════════════════════════
// BAG
// ═══════════════════════════════════════════
function openPanel(id){
  if(id==='bag') renderBag();
  if(id==='shop') renderShop();
  document.getElementById(id+'Panel').classList.add('open');
}
function closePanel(id){
  document.getElementById(id+'Panel').classList.remove('open');
}
function renderBag(){
  const grid=document.getElementById('bagGrid');
  grid.innerHTML='';
  const owned=Object.keys(state.inv);
  document.getElementById('bagSubLabel').textContent=`${owned.length}種類`;
  if(owned.length===0){
    grid.innerHTML=`<div class="bag-empty"><div style="font-size:48px;opacity:.2">🎒</div><div style="font-size:13px;letter-spacing:.1em">まだオーラがありません</div></div>`;
    return;
  }
  const sorted=[...owned].sort((a,b)=>{
    const ea=AURAS.find(x=>x.id===a),eb=AURAS.find(x=>x.id===b);
    return RAR_ORDER.indexOf(eb.rar)-RAR_ORDER.indexOf(ea.rar);
  });
  sorted.forEach(id=>{
    const a=AURAS.find(x=>x.id===id);if(!a)return;
    const on=state.equipped===id;
    const card=document.createElement('div');
    card.className='aura-card'+(on?' on':'');
    if(on){card.style.borderColor=a.col;card.style.setProperty('color',a.col);}
    card.innerHTML=`
      <div class="aura-preview" style="background:radial-gradient(${a.col}20,${a.col}06);border:1px solid ${a.col}33">
        <span style="font-size:28px">${a.icon}</span>
      </div>
      <div class="aura-name" style="color:${a.col}">${a.name}</div>
      <div class="aura-rar" style="color:${RAR_COL[a.rar]}">${a.rar}</div>
      <div class="aura-prob">1 / ${fmt(a.prob)}</div>
      <div class="aura-cnt">×${state.inv[id]}</div>
      <button class="aura-equip ${on?'off-btn':''}" onclick="equipAura('${id}')">${on?'外す':'装備する'}</button>
    `;
    grid.appendChild(card);
  });
}
function equipAura(id){
  if(state.equipped===id){state.equipped=null;showToast('オーラを外しました');}
  else{state.equipped=id;const a=AURAS.find(x=>x.id===id);showToast(`${a.icon} ${a.name} を装備！`);}
  applyLobbyFx();
  updateEquippedLabel();
  updateBagBtn();
  renderBag();
  save();
}
function updateEquippedLabel(){
  const el=document.getElementById('equippedLabel');
  if(state.equipped){
    const a=AURAS.find(x=>x.id===state.equipped);
    el.textContent=a.name;el.style.color=a.col;el.style.opacity='.5';
  } else {
    el.textContent='— NO AURA —';el.style.color='';el.style.opacity='.3';
  }
}
function updateBagBtn(){
  const btn=document.getElementById('bagTbtn');
  const lbl=document.getElementById('bagLabel');
  const cnt=Object.keys(state.inv).length;
  if(state.equipped){
    const a=AURAS.find(x=>x.id===state.equipped);
    lbl.textContent='バッグ';
    btn.classList.add('lit');
    btn.style.borderColor=a.col+'55';
    btn.style.color=a.col;
  } else {
    lbl.textContent=cnt>0?`バッグ (${cnt})`:'バッグ';
    btn.classList.remove('lit');
    btn.style.borderColor='';btn.style.color='';
  }
}

// ═══════════════════════════════════════════
// SHOP
// ═══════════════════════════════════════════
function renderShop(){
  document.getElementById('shopCoin').textContent=state.coins.toLocaleString();
  const luck=getLuck();
  document.getElementById('shopLuckVal').textContent=`×${luck.toFixed(2)}`;
  const pct=Math.min(100,(Math.log(luck)/Math.log(20))*100);
  document.getElementById('luckFill').style.width=pct+'%';

  // potions
  const pl=document.getElementById('potionList');pl.innerHTML='';
  POTIONS.forEach(p=>{
    const isActive=state.potion?.id===p.id&&Date.now()<(state.potion?.endsAt||0);
    const rem=isActive?Math.ceil((state.potion.endsAt-Date.now())/1000)+'s':null;
    const el=document.createElement('div');el.className='sitem';
    el.innerHTML=`
      <div class="sicon">${p.icon}</div>
      <div class="sinfo">
        <div class="sname">${p.name}</div>
        <div class="sdesc">${p.desc}</div>
        ${isActive?`<div class="stag" style="color:var(--c5)">▶ 効果中 ${rem}</div>`:''}
      </div>
      <button class="sbuy ${isActive?'active-pot':''}" onclick="buyPotion('${p.id}')" ${state.coins<p.cost?'disabled':''}>
        購入<br><small>🪙${p.cost}</small>
      </button>`;
    pl.appendChild(el);
  });

  // gear
  const gl=document.getElementById('gearList');gl.innerHTML='';
  GEAR.forEach(g=>{
    const owned=state.ownedGear[g.id];
    const isEq=state.equippedGear===g.id;
    const el=document.createElement('div');el.className='sitem';
    el.innerHTML=`
      <div class="sicon">${g.icon}</div>
      <div class="sinfo">
        <div class="sname">${g.name}</div>
        <div class="sdesc">${g.desc}</div>
        ${owned?`<div class="stag" style="color:var(--c1)">${isEq?'▶ 装備中':'所持済み'}</div>`:''}
      </div>
      ${owned
        ?`<button class="sbuy ${isEq?'active-pot':'owned'}" onclick="toggleGear('${g.id}')">${isEq?'外す':'装備'}</button>`
        :`<button class="sbuy" onclick="buyGear('${g.id}')" ${state.coins<g.cost?'disabled':''}>購入<br><small>🪙${fmt(g.cost)}</small></button>`
      }`;
    gl.appendChild(el);
  });
}
function buyPotion(id){
  const p=POTIONS.find(x=>x.id===id);
  if(!p||state.coins<p.cost)return;
  state.coins-=p.cost;
  state.potion={id:p.id,mult:p.mult,endsAt:Date.now()+p.dur};
  updateCoins();updateLuckChip();
  showToast(`${p.icon} ${p.name} 使用！ラック×${p.mult}`);
  renderShop();save();
  setTimeout(()=>{state.potion=null;updateLuckChip();renderShop&&renderShop();},p.dur);
}
function buyGear(id){
  const g=GEAR.find(x=>x.id===id);
  if(!g||state.coins<g.cost)return;
  state.coins-=g.cost;state.ownedGear[id]=true;
  updateCoins();showToast(`${g.icon} ${g.name} 購入！`);renderShop();save();
}
function toggleGear(id){
  state.equippedGear=state.equippedGear===id?null:id;
  const g=GEAR.find(x=>x.id===id);
  showToast(state.equippedGear===id?`${g.icon} ${g.name} 装備！`:'ギアを外しました');
  updateLuckChip();renderShop();save();
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function mk(tag,cls){const el=document.createElement(tag);el.className=cls;return el;}
function fmt(n){
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M';
  if(n>=1e4) return (n/1e3).toFixed(0)+'K';
  if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'')+'K';
  return n.toString();
}
function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function updateCoins(){
  document.getElementById('coinVal').textContent=state.coins.toLocaleString();
}
function updateLuckChip(){
  const l=getLuck();
  document.getElementById('luckVal').textContent=`×${l.toFixed(2)}`;
}
function updateLastRoll(a){
  const el=document.getElementById('lastRoll');
  el.innerHTML=`最後: ${a.icon} <span class="lr-name" style="color:${a.col}">${a.name}</span> <span style="color:rgba(200,220,255,.3)">1/${fmt(a.prob)}</span>`;
}
let toastT;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('up');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('up'),2200);
}

// ═══════════════════════════════════════════
// PASSIVE COIN REGEN
// ═══════════════════════════════════════════
setInterval(()=>{
  state.coins++;updateCoins();updateLuckChip();
},1000);

// ═══════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════
const SK='aurarngsave';
function save(){
  try{localStorage.setItem(SK,JSON.stringify({
    coins:state.coins,totalRolls:state.totalRolls,
    inv:state.inv,equipped:state.equipped,
    ownedGear:state.ownedGear,equippedGear:state.equippedGear,
    potion:state.potion&&Date.now()<state.potion.endsAt?state.potion:null,
  }));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(SK)||'null');
    if(!d)return;
    state.coins         = d.coins         ?? 250;
    state.totalRolls    = d.totalRolls    ?? 0;
    state.inv           = d.inv           ?? {};
    state.equipped      = d.equipped      ?? null;
    state.ownedGear     = d.ownedGear     ?? {};
    state.equippedGear  = d.equippedGear  ?? null;
    if(d.potion&&Date.now()<d.potion.endsAt){
      state.potion=d.potion;
      setTimeout(()=>{state.potion=null;updateLuckChip();},d.potion.endsAt-Date.now());
    }
  }catch(e){}
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
load();
updateCoins();
updateLuckChip();
updateEquippedLabel();
updateBagBtn();
applyLobbyFx();
document.getElementById('totalRolls').textContent=`総ロール数: ${state.totalRolls.toLocaleString()}`;
setInterval(save,15000);
</script>
</body>
</html>
